<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@capgo/capacitor-appsflyer Example</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Capgo plugin example</p>
        <h1>AppsFlyer test panel</h1>
        <p class="lead">
          Use this local shell to initialize the SDK, trigger a manual start, and inspect the current native start
          state while developing the plugin.
        </p>
      </section>

      <section class="panel">
        <div class="status-row">
          <div>
            <p class="label">SDK state</p>
            <strong id="status-badge" class="badge">Loading</strong>
          </div>
          <button id="refresh-start-state" class="ghost">Refresh</button>
        </div>

        <div class="actions">
          <button id="init-sdk">Init SDK</button>
          <button id="start-sdk" class="danger">Start SDK</button>
          <button id="get-sdk-version" class="ghost">Get SDK version</button>
        </div>

        <pre id="plugin-output">Loading SDK state...</pre>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
